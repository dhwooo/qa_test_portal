<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GSDK TEST TELEMETRY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #05070a;
    --bg-panel: #0b0f16;
    --bg-panel-alt: #10151e;
    --border: rgba(148,163,184,0.14);
    --border-strong: rgba(148,163,184,0.28);
    --accent: #2ee6d6;
    --accent-dim: rgba(46,230,214,0.14);
    --pass: #34e08a;
    --fail: #ff4d63;
    --fail-dim: rgba(255,77,99,0.12);
    --warn: #ffb020;
    --text-0: #eef3f7;
    --text-1: #9fb0c0;
    --text-2: #5b6b7c;
    --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --sans: 'IBM Plex Sans KR', 'IBM Plex Sans', -apple-system, sans-serif;
    --display: 'Rajdhani', var(--sans);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text-0);font-family:var(--sans);}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse 1200px 600px at 15% -10%, rgba(46,230,214,0.06), transparent 60%),
      radial-gradient(ellipse 900px 500px at 100% 0%, rgba(255,77,99,0.04), transparent 55%),
      var(--bg);
    position:relative;
  }
  body::before{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:1;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:overlay;
  }
  body::after{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:1;
    background-image: radial-gradient(rgba(148,163,184,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse 100% 60% at 50% 0%, black, transparent 75%);
  }

  .wrap{position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:28px 32px 80px;}

  /* ---------- top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding-bottom:20px; border-bottom:1px solid var(--border);
    opacity:0; animation: reveal .6s ease forwards;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{width:34px; height:34px; flex:none;}
  .brand-text h1{
    font-family:var(--display); font-weight:700; font-size:20px; letter-spacing:.08em;
    margin:0; color:var(--text-0); text-transform:uppercase;
  }
  .brand-text p{margin:2px 0 0; font-family:var(--mono); font-size:11px; color:var(--text-2); letter-spacing:.04em;}
  .status-pill{
    display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11.5px;
    color:var(--pass); border:1px solid rgba(52,224,138,0.3); background:rgba(52,224,138,0.06);
    padding:7px 12px; border-radius:100px; letter-spacing:.05em;
  }
  .status-pill .dot{width:7px; height:7px; border-radius:50%; background:var(--pass); box-shadow:0 0 8px var(--pass); animation: pulse 1.8s ease-in-out infinite;}
  .status-pill.offline{color:var(--fail); border-color:rgba(255,77,99,.3); background:rgba(255,77,99,.06);}
  .status-pill.offline .dot{background:var(--fail); box-shadow:0 0 8px var(--fail);}

  /* ---------- env strip ---------- */
  .env-strip{display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; opacity:0; animation: reveal .6s ease .05s forwards;}
  .env-chip{
    font-family:var(--mono); font-size:11px; color:var(--text-1);
    border:1px solid var(--border); border-radius:6px; padding:6px 10px; background:var(--bg-panel);
  }
  .env-chip b{color:var(--accent); font-weight:500;}

  /* ---------- hero ---------- */
  .hero{
    display:grid; grid-template-columns:260px 1fr; gap:20px; margin-top:26px;
  }
  .panel{
    position:relative; background:var(--bg-panel); border:1px solid var(--border); border-radius:10px;
    padding:22px; overflow:hidden;
  }
  .panel::before, .panel::after{content:""; position:absolute; width:16px; height:16px; pointer-events:none;}
  .corner{position:relative;}
  .corner .cbr{position:absolute; width:14px; height:14px; border-color:var(--border-strong); opacity:.9;}
  .corner .cbr.tl{top:-1px; left:-1px; border-top:2px solid; border-left:2px solid; border-color:var(--accent);}
  .corner .cbr.br{bottom:-1px; right:-1px; border-bottom:2px solid; border-right:2px solid; border-color:var(--accent);}

  .ring-panel{
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    opacity:0; animation: reveal .7s ease .1s forwards;
  }
  .ring-panel .sweep{
    position:absolute; inset:0; background:linear-gradient(180deg, transparent, rgba(46,230,214,.08), transparent);
    animation: sweep 3.6s linear infinite; pointer-events:none;
  }
  .ring-wrap{position:relative; width:168px; height:168px;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-num{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column;
  }
  .ring-num .pct{font-family:var(--display); font-size:38px; font-weight:700; color:var(--text-0); line-height:1;}
  .ring-num .lbl{font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--text-2); margin-top:6px;}

  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  .stat{
    opacity:0; animation: reveal .6s ease forwards;
    display:flex; flex-direction:column; justify-content:space-between; min-height:112px;
  }
  .stat:nth-child(1){animation-delay:.14s;}
  .stat:nth-child(2){animation-delay:.18s;}
  .stat:nth-child(3){animation-delay:.22s;}
  .stat:nth-child(4){animation-delay:.26s;}
  .stat .lbl{font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:var(--text-2); text-transform:uppercase;}
  .stat .num{font-family:var(--display); font-size:34px; font-weight:700; margin-top:10px;}
  .stat.passed .num{color:var(--pass);}
  .stat.failed .num{color:var(--fail);}
  .stat.total .num{color:var(--text-0);}
  .stat.skipped .num{color:var(--warn);}
  .stat .sub{font-family:var(--mono); font-size:10.5px; color:var(--text-2); margin-top:4px;}

  /* ---------- log section ---------- */
  .log-head{
    display:flex; align-items:baseline; justify-content:space-between; margin:34px 0 12px;
    opacity:0; animation: reveal .6s ease .3s forwards;
  }
  .log-head h2{
    font-family:var(--display); font-size:15px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-0); margin:0;
  }
  .log-head span{font-family:var(--mono); font-size:11px; color:var(--text-2);}

  .row{
    display:grid; grid-template-columns:100px 1fr auto 90px 150px;
    align-items:center; gap:16px;
    padding:14px 16px; border:1px solid var(--border); border-left:3px solid transparent;
    border-radius:8px; background:var(--bg-panel); margin-bottom:8px;
    opacity:0; animation: reveal .5s ease forwards;
    transition: border-color .15s ease, background .15s ease, transform .15s ease;
  }
  .row:hover{background:var(--bg-panel-alt); border-color:var(--border-strong); transform:translateX(2px);}
  .row.st-failed{border-left-color:var(--fail);}
  .row.st-passed{border-left-color:transparent;}

  .pill{
    display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10.5px;
    letter-spacing:.06em; padding:4px 9px; border-radius:100px; width:fit-content;
  }
  .pill .d{width:6px; height:6px; border-radius:50%;}
  .pill.passed{color:var(--pass); background:rgba(52,224,138,.09); border:1px solid rgba(52,224,138,.28);}
  .pill.passed .d{background:var(--pass);}
  .pill.failed{color:var(--fail); background:var(--fail-dim); border:1px solid rgba(255,77,99,.32);}
  .pill.failed .d{background:var(--fail); box-shadow:0 0 6px var(--fail);}
  .pill.broken{color:var(--warn); background:rgba(255,176,32,.09); border:1px solid rgba(255,176,32,.3);}
  .pill.broken .d{background:var(--warn);}
  .pill.skipped{color:var(--text-2); background:rgba(148,163,184,.08); border:1px solid var(--border-strong);}
  .pill.skipped .d{background:var(--text-2);}

  .tname{display:flex; flex-direction:column; gap:5px; min-width:0;}
  .tname .n{font-family:var(--mono); font-size:13px; color:var(--text-0); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tname .msg{font-family:var(--mono); font-size:11.5px; color:var(--fail); opacity:.92; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tags{display:flex; gap:6px;}
  .tag{font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; padding:3px 7px; border-radius:4px; border:1px solid var(--border-strong); color:var(--text-1); text-transform:uppercase;}
  .tag.mock{color:var(--accent); border-color:rgba(46,230,214,.35);}
  .tag.real_hw{color:var(--warn); border-color:rgba(255,176,32,.35);}
  .dur{font-family:var(--mono); font-size:12px; color:var(--text-1); text-align:right;}
  .view-link{
    font-family:var(--mono); font-size:11px; letter-spacing:.04em; color:var(--text-1); text-decoration:none;
    border:1px solid var(--border-strong); padding:7px 10px; border-radius:6px; text-align:center; white-space:nowrap;
    transition: color .15s ease, border-color .15s ease, background .15s ease;
  }
  .view-link:hover{color:var(--accent); border-color:var(--accent); background:var(--accent-dim);}

  footer{
    margin-top:38px; padding-top:16px; border-top:1px solid var(--border);
    display:flex; justify-content:space-between; font-family:var(--mono); font-size:10.5px; color:var(--text-2);
    opacity:0; animation: reveal .6s ease .5s forwards;
  }
  footer a{color:var(--text-1);}

  .boot{
    font-family:var(--mono); color:var(--text-2); font-size:12.5px; padding:60px 0; text-align:center;
  }
  .boot .cursor{display:inline-block; width:7px; height:13px; background:var(--accent); margin-left:4px; animation:blink 1s step-end infinite; vertical-align:-2px;}
  .error-box{
    font-family:var(--mono); font-size:12.5px; color:var(--fail); background:var(--fail-dim);
    border:1px solid rgba(255,77,99,.3); padding:16px 18px; border-radius:8px; line-height:1.7;
  }

  @keyframes reveal{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
  @keyframes sweep{ 0%{transform:translateY(-100%);} 100%{transform:translateY(100%);} }
  @keyframes blink{ 50%{opacity:0;} }

  @media (max-width:760px){
    .hero{grid-template-columns:1fr;}
    .stats{grid-template-columns:repeat(2,1fr);}
    .row{grid-template-columns:1fr; row-gap:8px;}
    .dur, .view-link{justify-self:start;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 34 34" fill="none">
          <circle cx="17" cy="17" r="15.5" stroke="#2ee6d6" stroke-width="1.4" opacity=".5"/>
          <path d="M17 8a9 9 0 0 0-9 9" stroke="#2ee6d6" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M17 12a5 5 0 0 0-5 5v3" stroke="#2ee6d6" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="17" cy="17" r="2.2" fill="#2ee6d6"/>
          <path d="M17 22v3" stroke="#2ee6d6" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <div class="brand-text">
          <h1>GSDK Test Telemetry</h1>
          <p id="subtitle">SUPREMA G-SDK &middot; ACCESS CONTROL VALIDATION</p>
        </div>
      </div>
      <div class="status-pill" id="statusPill"><span class="dot"></span><span id="statusText">CONNECTING…</span></div>
    </div>

    <div id="app">
      <div class="boot">INITIALIZING TELEMETRY FEED<span class="cursor"></span></div>
    </div>

    <footer>
      <span id="genTime">—</span>
      <a id="allureHomeLink" href="http://localhost:4567/index.html" target="_blank">전체 Allure 리포트 열기 →</a>
    </footer>
  </div>

<script>
// Allure2 정적 리포트는 애셋을 절대 루트 경로("/assets/...")로 참조하기 때문에
// 서브폴더에 얹을 수 없다. 그래서 별도 포트(자체 루트)로 서빙한다.
const ALLURE_ORIGIN = window.ALLURE_ORIGIN || 'http://localhost:4567';
const BASE = ALLURE_ORIGIN;

function fmtDur(ms){
  if(ms == null) return '—';
  if(ms < 1000) return ms + 'ms';
  return (ms/1000).toFixed(2) + 's';
}

function flattenTests(node, acc){
  if(!node) return acc;
  if(node.uid && node.status && !node.children){
    acc.push(node);
  }
  if(node.children){
    for(const c of node.children) flattenTests(c, acc);
  }
  return acc;
}

async function main(){
  const app = document.getElementById('app');
  const statusPill = document.getElementById('statusPill');
  const statusText = document.getElementById('statusText');

  try{
    const [summary, env, suites] = await Promise.all([
      fetch(`${BASE}/widgets/summary.json`).then(r=>{ if(!r.ok) throw new Error('summary.json ' + r.status); return r.json(); }),
      fetch(`${BASE}/widgets/environment.json`).then(r=> r.ok ? r.json() : []),
      fetch(`${BASE}/data/suites.json`).then(r=>{ if(!r.ok) throw new Error('suites.json ' + r.status); return r.json(); }),
    ]);

    statusPill.classList.remove('offline');
    statusText.textContent = 'SYSTEM ONLINE';

    const stat = summary.statistic || {};
    const total = stat.total || 0;
    const passed = stat.passed || 0;
    const failed = (stat.failed||0) + (stat.broken||0);
    const skipped = stat.skipped || 0;
    const passRate = total ? Math.round((passed/total)*100) : 0;

    const tests = flattenTests(suites, []).sort((a,b)=>{
      const order = {failed:0, broken:1, skipped:2, passed:3};
      return (order[a.status] ?? 9) - (order[b.status] ?? 9);
    });

    // fetch statusMessage for non-passing tests
    const failing = tests.filter(t => t.status === 'failed' || t.status === 'broken');
    const detailEntries = await Promise.all(failing.map(t =>
      fetch(`${BASE}/data/test-cases/${t.uid}.json`).then(r=> r.ok ? r.json() : null).catch(()=>null)
    ));
    const detailMap = {};
    failing.forEach((t,i)=>{ if(detailEntries[i]) detailMap[t.uid] = detailEntries[i]; });

    const envHtml = env.map(e => `<div class="env-chip"><b>${e.name}</b> ${e.values.join(', ')}</div>`).join('');

    const R = 72, C = 2*Math.PI*R;
    const ringOffsetTarget = C - (passRate/100)*C;

    const rowsHtml = tests.map((t, idx) => {
      const label = {passed:'PASS', failed:'FAIL', broken:'BROKEN', skipped:'SKIP', unknown:'UNKNOWN'}[t.status] || t.status.toUpperCase();
      const tagsHtml = (t.tags||[]).map(tag => `<span class="tag ${tag}">${tag}</span>`).join('');
      const detail = detailMap[t.uid];
      const msg = detail && detail.statusMessage ? detail.statusMessage.split('\n')[0] : '';
      const href = `${BASE}/index.html#suites/${t.parentUid}/${t.uid}/`;
      return `
        <div class="row st-${t.status}" style="animation-delay:${0.34 + idx*0.035}s">
          <span class="pill ${t.status}"><span class="d"></span>${label}</span>
          <div class="tname">
            <span class="n">${t.name}</span>
            ${msg ? `<span class="msg">▸ ${msg.replace(/</g,'&lt;')}</span>` : ''}
          </div>
          <div class="tags">${tagsHtml}</div>
          <span class="dur">${fmtDur(t.time && t.time.duration)}</span>
          <a class="view-link" href="${href}" target="_blank">ALLURE에서 보기 →</a>
        </div>`;
    }).join('');

    app.innerHTML = `
      <div class="env-strip">${envHtml}</div>
      <div class="hero">
        <div class="panel ring-panel corner">
          <span class="cbr tl"></span><span class="cbr br"></span>
          <div class="sweep"></div>
          <div class="ring-wrap">
            <svg width="168" height="168" viewBox="0 0 168 168">
              <circle cx="84" cy="84" r="${R}" fill="none" stroke="rgba(148,163,184,0.14)" stroke-width="10"/>
              <circle id="ringFg" cx="84" cy="84" r="${R}" fill="none" stroke="${failed>0?'url(#g2)':'url(#g1)'}"
                stroke-width="10" stroke-linecap="round"
                stroke-dasharray="${C}" stroke-dashoffset="${C}"
                style="transition: stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1) .3s;"/>
              <defs>
                <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#2ee6d6"/><stop offset="100%" stop-color="#34e08a"/>
                </linearGradient>
                <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#2ee6d6"/><stop offset="100%" stop-color="#ff4d63"/>
                </linearGradient>
              </defs>
            </svg>
            <div class="ring-num"><span class="pct">${passRate}%</span><span class="lbl">PASS RATE</span></div>
          </div>
        </div>
        <div class="stats">
          <div class="panel stat total corner"><span class="cbr tl"></span><span class="cbr br"></span>
            <span class="lbl">Total Cases</span><span class="num">${total}</span><span class="sub">GSDK CONNECT SUITE</span></div>
          <div class="panel stat passed corner"><span class="cbr tl"></span><span class="cbr br"></span>
            <span class="lbl">Passed</span><span class="num">${passed}</span><span class="sub">VERIFIED OK</span></div>
          <div class="panel stat failed corner"><span class="cbr tl"></span><span class="cbr br"></span>
            <span class="lbl">Failed</span><span class="num">${failed}</span><span class="sub">NEEDS REVIEW</span></div>
          <div class="panel stat skipped corner"><span class="cbr tl"></span><span class="cbr br"></span>
            <span class="lbl">Skipped</span><span class="num">${skipped}</span><span class="sub">NOT EXECUTED</span></div>
        </div>
      </div>

      <div class="log-head">
        <h2>Test Execution Log</h2>
        <span>${tests.length} entries &middot; sorted by severity</span>
      </div>
      ${rowsHtml}
    `;

    requestAnimationFrame(()=>{
      const fg = document.getElementById('ringFg');
      if(fg) fg.style.strokeDashoffset = String(ringOffsetTarget);
    });

    const start = summary.time && summary.time.start;
    document.getElementById('genTime').textContent = start
      ? `LAST RUN ${new Date(start).toLocaleString('ko-KR')}` : '';

  }catch(err){
    statusPill.classList.add('offline');
    statusText.textContent = 'NO SIGNAL';
    app.innerHTML = `<div class="error-box">
      ⨯ 리포트 데이터를 불러오지 못했습니다 (${err.message}).<br/>
      먼저 <b>allure-report</b>를 생성해야 합니다:<br/><br/>
      pytest tests/ --alluredir=allure-results<br/>
      allure generate allure-results -o allure-report --clean<br/><br/>
      그리고 <code>allure-report/</code>가 ${ALLURE_ORIGIN} 에서 별도로 서빙되고 있는지 확인하세요
      (Allure 리포트는 애셋 경로가 절대 루트 기준이라 서브폴더로 못 넣습니다).
    </div>`;
  }
}
main();
</script>
</body>
</html>
