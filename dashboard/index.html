<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Suprema Test Portal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="login-gate" id="loginGate">
  <div class="login-card">
    <div class="brand-icon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><rect x="5" y="3.5" width="14" height="17" rx="2.4" stroke="white" stroke-width="1.7"/><path d="M9 3.5h6a1 1 0 0 1 1 1v.8a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-.8a1 1 0 0 1 1-1Z" fill="white"/><path d="m8.7 12.8 2.1 2.1 4.5-4.5" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h2>Suprema Test Portal</h2>
    <p>GSDK QA 자동화 플랫폼<br>회사 Jira Cloud 계정으로 로그인하세요</p>
    <button class="btn-jira" id="jiraLoginBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M11.53 2 2 11.4a1.3 1.3 0 0 0 0 1.85l3.2 3.16 6.33-6.28 6.33 6.28 3.2-3.16a1.3 1.3 0 0 0 0-1.85L11.53 2Z" fill="white"/><path d="M11.53 22 5.2 15.72 11.53 9.45l6.33 6.27L11.53 22Z" fill="white" opacity=".55"/></svg>
      Jira 계정으로 로그인
    </button>
    <div class="login-foot">SSO · Atlassian OAuth 2.0</div>
  </div>
</div>

<div class="shell" id="appShell" style="display:none">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><rect x="5" y="3.5" width="14" height="17" rx="2.4" stroke="white" stroke-width="1.7"/><path d="M9 3.5h6a1 1 0 0 1 1 1v.8a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-.8a1 1 0 0 1 1-1Z" fill="white"/><path d="m8.7 12.8 2.1 2.1 4.5-4.5" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="brand-name">Suprema Test Portal</div>
    </div>

    <div class="nav-section">개요</div>
    <div class="nav-item active" data-view="dashboard">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/></svg></span>
      대시보드
    </div>

    <div class="nav-section">테스트</div>
    <div class="nav-item" data-view="suites">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/></svg></span>
      테스트 스위트
    </div>
    <div class="nav-item" data-view="runs">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l2.5 2.5"/><circle cx="12" cy="12" r="9"/></svg></span>
      실행 기록
    </div>
    <div class="nav-item" data-view="flaky">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 20h20L12 3Z"/><path d="M12 9v5"/><circle cx="12" cy="17" r=".6" fill="currentColor"/></svg></span>
      Flaky 관리
      <span class="nav-soon">Soon</span>
    </div>

    <div class="nav-section">연동</div>
    <div class="nav-item" data-view="cases">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg></span>
      테스트 케이스
      <span class="nav-soon">Jira</span>
    </div>
    <div class="nav-item" id="navSettings">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.96 19.3a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.04H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.7 8.96a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1.04-1.56V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.04 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.56 1.04H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15Z"/></svg></span>
      설정
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="back-btn" id="backBtn" style="display:none" title="뒤로">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div>
          <h1 id="viewTitle">대시보드</h1>
          <div class="meta" id="viewMeta">Suprema G-SDK 연동 테스트 · 실행 결과 요약</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-context" id="topbarRight" style="display:none">
          <span class="mode-badge" id="modeBadge"><span class="d"></span>Mock 모드</span>
          <button class="icon-btn" id="refreshBtn" title="새로고침">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5"/></svg>
          </button>
        </div>
        <span class="topbar-div"></span>
        <div class="user-chip">
          <div class="avatar" id="userAvatar">?</div>
          <div class="txt">
            <div class="name" id="userName">—</div>
            <div class="role" id="userRole">—</div>
          </div>
        </div>
        <button class="icon-btn" id="settingsBtn" title="설정">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.96 19.3a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.04H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.7 8.96a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1.04-1.56V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.04 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.56 1.04H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15Z"/></svg>
        </button>
        <button class="icon-btn danger" id="logoutBtn" title="로그아웃">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="boot">불러오는 중…</div>
    </div>
  </main>
</div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="./js/utils.js"></script>
<script src="./js/data.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/components.js"></script>
<script src="./js/views.js"></script>
<script src="./js/main.js"></script>
</body>
</html>
