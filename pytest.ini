[pytest]
markers =
    real_hw: 실제 Suprema 하드웨어 장비/서버에 연결해서 도는 테스트
    mock: mock/가짜 응답 기반으로 도는 테스트
    xray(test_key): Xray Test 이슈 키와 연결 (JUnit XML properties에 자동 기록됨)
addopts =
    --allure-link-pattern=issue:https://your-company.atlassian.net/browse/{}
    --allure-link-pattern=tms:https://your-company.atlassian.net/browse/{}
junit_family = legacy
